name: spending_check
version: "1.0.0"
config-version: 2

profile: spending_check

model-paths: ["models"]
test-paths:  ["tests"]
macro-paths: ["macros"]

target-path:    "target"
clean-targets:  ["target", "dbt_packages"]

vars:
  source_schema:             main       # override to 'spending_check' for BigQuery prod
  target_year:               2026
  target_month:              4
  category_trend_months:     6
  recurring_min_months:      3
  recurring_lookback_months: 6
  dormant_gap_months:        2
  dormant_lookback_months:   12

models:
  spending_check:
    staging:
      +materialized: view
    marts:
      +materialized: table
